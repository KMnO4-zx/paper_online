<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Insight - AI驱动的学术论文智能分析</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/images/logo.svg">
    <meta name="theme-color" content="#f6d365">
    <!-- Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- KaTeX 数学公式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="header-logo" onclick="window.location.href='/';" style="cursor: pointer;">
                <img src="../images/logo.svg" alt="Logo">
                Paper Insight
            </div>
            <div class="online-count" id="online-count">
                <span class="online-dot"></span>
                <span id="online-number">0</span> 人在线
            </div>
            <div class="header-links">
                <a href="https://www.xiaohongshu.com/user/profile/63c2055e000000002502c58c" target="_blank" title="小红书">
                    <img src="https://img.shields.io/badge/小红书-fe2c55?logo=xiaohongshu&logoColor=white" alt="小红书">
                </a>
                <a href="https://www.zhihu.com/people/feng-qi-xia-pian" target="_blank" title="知乎">
                    <img src="https://img.shields.io/badge/知乎-0084ff?logo=zhihu&logoColor=white" alt="知乎">
                </a>
                <a href="https://github.com/KMnO4-zx/paper_online" target="_blank" title="GitHub">
                    <img src="https://img.shields.io/badge/GitHub-181717?logo=github&logoColor=white" alt="GitHub">
                </a>
            </div>
        </div>
    </div>
    <!-- 主页输入表单 -->
    <div class="home-container" id="home-section" style="display: none;">
        <div class="search-card">
            <h2>搜索论文</h2>
            <p>搜索所有会议的论文</p>
            <div class="search-filters">
                <label><input type="checkbox" id="home-search-title" checked> Title</label>
                <label><input type="checkbox" id="home-search-abstract" checked> Abstract</label>
                <label><input type="checkbox" id="home-search-keywords" checked> Keywords</label>
            </div>
            <form class="search-form" id="search-form">
                <input type="text" class="search-input" id="search-input"
                       placeholder="输入关键词搜索..." required>
                <button type="submit" class="search-btn">搜索</button>
            </form>
        </div>
        <div class="recent-section">
            <h3 class="recent-title">浏览会议论文</h3>
            <div class="conference-cards">
                <a href="?conference=iclr_2026" class="conference-entry-card">
                    <h2>ICLR 2026</h2>
                    <p>International Conference on Learning Representations</p>
                </a>
                <a href="?conference=neurips_2025" class="conference-entry-card">
                    <h2>NeurIPS 2025</h2>
                    <p>Neural Information Processing Systems</p>
                </a>
                <a href="?conference=icml_2025" class="conference-entry-card">
                    <h2>ICML 2025</h2>
                    <p>International Conference on Machine Learning</p>
                </a>
            </div>
        </div>
    </div>

    <div class="main-content" id="analysis-section" style="display: none;">
        <div class="left-col">
            <div class="card" id="paper-card">
                <div class="loading" id="paper-loading">
                    <div class="spinner"></div>
                    <span>加载论文信息...</span>
                </div>
                <div id="paper-content" style="display: none;">
                    <h1 class="paper-title" id="paper-title"></h1>
                    <div class="keywords" id="keywords"></div>
                    <p class="abstract" id="abstract"></p>
                    <div class="links">
                        <a class="link-btn openreview" id="openreview-link" target="_blank">OpenReview</a>
                        <a class="link-btn pdf" id="pdf-link" target="_blank">PDF</a>
                    </div>
                </div>
            </div>

            <div class="card">
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <h2 class="section-title" style="margin-bottom: 0; padding-bottom: 12px;">AI 分析</h2>
                    <a class="link-btn openreview" id="reanalyze-btn" style="display: none; cursor: pointer; font-size: 0.8em; padding: 6px 14px;" onclick="reanalyze()">重新分析</a>
                </div>
                <div id="llm-container">
                    <div class="loading" id="llm-loading">
                        <div class="spinner"></div>
                        <span>正在分析论文...</span>
                    </div>
                    <div class="llm-response" id="llm-response"></div>
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="chat-panel">
                <div class="chat-main">
                    <div class="chat-header">
                        <h3>论文对话</h3>
                        <div>
                            <button class="chat-new-btn" onclick="newChatSession()">新对话</button>
                            <button class="chat-new-btn" onclick="toggleSidebar()">历史对话</button>
                        </div>
                    </div>
                    <div class="chat-messages" id="chat-messages">
                        <div class="chat-empty">输入问题，开始与论文对话</div>
                    </div>
                    <div class="chat-input-area">
                        <textarea class="chat-input" id="chat-input" rows="1" placeholder="输入你的问题..."></textarea>
                        <button class="chat-send-btn" id="chat-send-btn" onclick="sendChat()">发送</button>
                    </div>
                </div>
                <div class="chat-sidebar hidden">
                    <div class="chat-sidebar-header">
                        <span style="font-size:0.8em;color:var(--text-secondary);">历史对话</span>
                    </div>
                    <div class="chat-sessions" id="chat-sessions"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="conference-container" id="conference-section" style="display: none;">
        <h1 id="conference-title"></h1>
        <div class="search-filters">
            <label><input type="checkbox" id="search-title" checked> Title</label>
            <label><input type="checkbox" id="search-abstract" checked> Abstract</label>
            <label><input type="checkbox" id="search-keywords" checked> Keywords</label>
        </div>
        <div class="search-bar">
            <input id="conference-search" type="text" placeholder="搜索关键词... (Shift+Enter 搜索)">
            <button id="conference-search-btn" class="search-btn">Search</button>
        </div>
        <div id="conference-papers"></div>
        <div id="conference-pagination"></div>
    </div>

    <div class="conference-container" id="search-section" style="display: none;">
        <h1>搜索结果</h1>
        <div class="search-filters">
            <label><input type="checkbox" id="global-search-title" checked> Title</label>
            <label><input type="checkbox" id="global-search-abstract" checked> Abstract</label>
            <label><input type="checkbox" id="global-search-keywords" checked> Keywords</label>
        </div>
        <div class="search-bar">
            <input id="global-search-input" type="text" placeholder="搜索关键词... (Shift+Enter 搜索)">
            <button id="global-search-btn" class="search-btn">Search</button>
        </div>
        <div id="search-papers"></div>
        <div id="search-pagination"></div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/home.js"></script>
    <script src="/js/paper.js"></script>
    <script src="/js/chat.js"></script>
    <script src="/js/conference.js"></script>
    <script src="/js/search.js"></script>
    <script src="/js/online.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
