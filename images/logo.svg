<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="tl" gradientUnits="userSpaceOnUse" x1="120" y1="120" x2="200" y2="200">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5a6c1"/>
    </linearGradient>

    <linearGradient id="tr" gradientUnits="userSpaceOnUse" x1="280" y1="120" x2="200" y2="200">
      <stop offset="0%" stop-color="#ffedf2"/>
      <stop offset="100%" stop-color="#f08fa9"/>
    </linearGradient>

    <linearGradient id="bl" gradientUnits="userSpaceOnUse" x1="120" y1="280" x2="200" y2="200">
      <stop offset="0%" stop-color="#cbf2ff"/>
      <stop offset="45%" stop-color="#6bc1f0"/>
      <stop offset="100%" stop-color="#409fd9"/>
    </linearGradient>

    <linearGradient id="br" gradientUnits="userSpaceOnUse" x1="200" y1="200" x2="280" y2="280">
      <stop offset="0%" stop-color="#4db3ef"/>
      <stop offset="100%" stop-color="#2672bd"/>
    </linearGradient>

    <g id="sparkle">
      <path d="M 0,-14 L 1.5,-2.5 L 14,0 L 1.5,2.5 L 0,14 L -1.5,2.5 L -14,0 L -1.5,-2.5 Z" fill="#ffffff" filter="url(#softGlow)"/>
      <path d="M 0,-8 L 1,-1.5 L 8,0 L 1,1.5 L 0,8 L -1,1.5 L -8,0 L -1,-1.5 Z" fill="#ffffff"/>
    </g>
  </defs>

  <circle cx="200" cy="200" r="140" fill="#a4e1ff" opacity="0.4" filter="url(#heavyGlow)" />

  <g transform="translate(0, 0)">
    <polygon points="200,40 350,200 200,360 50,200" fill="none" stroke="#87d3f8" stroke-width="42" stroke-linejoin="round" filter="url(#heavyGlow)" opacity="0.8" />

    <polygon points="200,40 350,200 200,360 50,200" fill="none" stroke="#a4dfff" stroke-width="32" stroke-linejoin="round" />

    <polygon points="200,40 350,200 200,360 50,200" fill="none" stroke="#ffffff" stroke-width="20" stroke-linejoin="round" />

    <polygon points="200,40 350,200 200,360 50,200" fill="none" stroke="#6ac0ef" stroke-width="6" stroke-linejoin="round" />

    <polygon points="200,40 350,200 200,360 50,200" fill="#ffffff" />

    <polygon points="200,40 50,200 200,200" fill="url(#tl)" />
    <polygon points="200,40 350,200 200,200" fill="url(#tr)" />
    <polygon points="50,200 200,360 200,200" fill="url(#bl)" />
    <polygon points="350,200 200,360 200,200" fill="url(#br)" />

    <path d="M 200 40 L 200 360 M 50 200 L 350 200" stroke="#ffffff" stroke-width="2" opacity="0.6" />
    <polygon points="199,40 201,40 202,200 198,200" fill="#ffffff" opacity="0.8"/>
    <polygon points="50,199 50,201 200,202 200,198" fill="#ffffff" opacity="0.9"/>
    <polygon points="200,198 200,202 350,201 350,199" fill="#ffffff" opacity="0.4"/>

    <polygon points="200,170 204,196 230,200 204,204 200,230 196,204 170,200 196,196" fill="#ffffff" filter="url(#softGlow)" opacity="0.9" />
    <polygon points="200,175 203,197 225,200 203,203 200,225 197,203 175,200 197,197" fill="#ffffff" />
  </g>

  <use href="#sparkle" x="80" y="85" transform="scale(0.8)" opacity="0.9" />
  <use href="#sparkle" x="325" y="105" transform="scale(0.6)" opacity="0.7" />
  <use href="#sparkle" x="110" y="315" transform="scale(0.5)" opacity="0.8" />
  <use href="#sparkle" x="290" y="300" transform="scale(0.9)" opacity="0.85" />
</svg>
