<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f6d365;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fda085;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Lightbulb body -->
  <circle cx="256" cy="200" r="100" fill="none" stroke="url(#gradient)" stroke-width="16"/>

  <!-- Lightbulb base -->
  <rect x="226" y="290" width="60" height="40" rx="8" fill="none" stroke="url(#gradient)" stroke-width="16"/>

  <!-- Lightbulb filament -->
  <path d="M 256 160 L 256 200 M 236 180 L 276 180" stroke="url(#gradient)" stroke-width="12" stroke-linecap="round"/>

  <!-- Document lines (paper content) -->
  <line x1="200" y1="360" x2="312" y2="360" stroke="url(#gradient)" stroke-width="12" stroke-linecap="round"/>
  <line x1="200" y1="400" x2="312" y2="400" stroke="url(#gradient)" stroke-width="12" stroke-linecap="round"/>
  <line x1="200" y1="440" x2="280" y2="440" stroke="url(#gradient)" stroke-width="12" stroke-linecap="round"/>
</svg>
